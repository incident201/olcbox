name: Build Android Debug APK

on:
  workflow_dispatch:
  push:
    branches: [ main, universal-carrier ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

env:
  ANDROID_NDK_VERSION: "28.2.13676358"
  OLCBOX_OLCRTC_REF: "master"

jobs:
  build-android-debug-apk:
    name: Build Android debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout olcbox
        uses: actions/checkout@v6
        with:
          path: olcbox

      - name: Checkout olcrtc
        uses: actions/checkout@v6
        with:
          repository: incident201/olcrtc
          ref: ${{ env.OLCBOX_OLCRTC_REF }}
          path: olcrtc
          submodules: recursive

      - name: Setup JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: 'stable'
          cache-dependency-path: olcrtc/go.sum

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4

      - name: Install Android SDK packages
        run: |
          sdkmanager "platforms;android-37.0" "build-tools;36.0.0" "ndk;${ANDROID_NDK_VERSION}"
          if [ -d "${ANDROID_HOME}/platforms/android-37.0" ] && [ ! -e "${ANDROID_HOME}/platforms/android-37" ]; then
            ln -s "${ANDROID_HOME}/platforms/android-37.0" "${ANDROID_HOME}/platforms/android-37"
          fi

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Install Go mobile tooling
        run: |
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
          go install golang.org/x/mobile/cmd/gomobile@latest
          go install github.com/magefile/mage@latest

      - name: Initialize gomobile
        working-directory: olcrtc
        run: |
          export ANDROID_NDK_HOME="${ANDROID_HOME}/ndk/${ANDROID_NDK_VERSION}"
          export ANDROID_NDK_ROOT="${ANDROID_NDK_HOME}"
          gomobile init

      - name: Build debug APK
        working-directory: olcbox
        run: |
          export OLCRTC_REPO="${{ github.workspace }}/olcrtc"
          export ANDROID_NDK_HOME="${ANDROID_HOME}/ndk/${ANDROID_NDK_VERSION}"
          export ANDROID_NDK_ROOT="${ANDROID_NDK_HOME}"
          ./gradlew :androidApp:assembleDebug --stacktrace --no-configuration-cache

      - name: Prepare debug APK artifact
        working-directory: olcbox
        run: |
          mkdir -p dist
          debug_apk="$(find androidApp/build/outputs/apk/debug -maxdepth 1 -type f -name '*.apk' | sort | head -n 1)"
          if [ -z "${debug_apk}" ]; then
            echo "Android debug APK was not found" >&2
            exit 1
          fi
          cp "${debug_apk}" "dist/Olcbox-android-debug.apk"

      - name: Upload debug APK artifact
        uses: actions/upload-artifact@v7
        with:
          name: Olcbox-android-debug-apk
          path: olcbox/dist/Olcbox-android-debug.apk
